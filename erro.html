<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - BIG TOPS GAMES</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Rajdhani',sans-serif;
    background:#090015;
    color:#fff;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#ff00ff55,transparent 50%),
    linear-gradient(#120028,#05000d);
    z-index:-3;
}

.grid{
    position:fixed;
    width:200%;
    height:120%;
    left:-50%;
    bottom:-40%;
    background:
    linear-gradient(#ff00ff55 2px,transparent 2px),
    linear-gradient(90deg,#ff00ff55 2px,transparent 2px);
    background-size:60px 60px;
    transform:perspective(700px) rotateX(80deg);
    animation:gridMove 12s linear infinite;
    z-index:-2;
}

@keyframes gridMove{
    from{
        transform:perspective(700px) rotateX(80deg) translateY(0);
    }
    to{
        transform:perspective(700px) rotateX(80deg) translateY(60px);
    }
}

.sun{
    position:fixed;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    height:320px;
    border-radius:50%;
    background:linear-gradient(#ffdd55,#ff00aa);
    box-shadow:0 0 80px #ff00ff;
    z-index:-1;
}

.sun::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    background:
    repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 12px,
        rgba(0,0,0,.35) 13px,
        rgba(0,0,0,.35) 16px
    );
}

.container{
    max-width:850px;
    padding:30px;
}

.logo{
    font-family:'Orbitron';
    font-size:34px;
    font-weight:900;
    color:#00ffff;
    text-shadow:
        0 0 10px #00ffff,
        0 0 25px #00ffff;
    margin-bottom:35px;
}

.error{
    font-family:'Orbitron';
    font-size:180px;
    line-height:1;
    color:#fff;
    text-shadow:
        0 0 10px #fff,
        0 0 25px #ff00ff,
        0 0 50px #00ffff;
}

h1{
    margin-top:15px;
    font-size:42px;
    color:#00ffff;
}

p{
    margin-top:25px;
    font-size:25px;
    line-height:1.6;
    color:#ddd;
}

.btn{
    display:inline-block;
    margin-top:45px;
    padding:16px 42px;
    border:2px solid #00ffff;
    border-radius:50px;
    color:#fff;
    text-decoration:none;
    font-size:22px;
    transition:.3s;
    box-shadow:0 0 20px #00ffff66;
}

.btn:hover{
    background:#00ffff;
    color:#111;
    transform:scale(1.05);
}

.icon{
    font-size:80px;
    margin-bottom:15px;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-12px);
    }
}
</style>
</head>

<body>

<div class="grid"></div>
<div class="sun"></div>

<div class="container">

    <div class="logo">BIG TOPS GAMES</div>

    <div class="icon">🎭</div>

    <div class="error">404</div>

    <h1>Ops... essa página desapareceu.</h1>

    <p>
        A página foi participar de um assalto em <strong>Payday 2</strong>.<br>
        O plano era entrar em <strong>Stealth</strong>, mas alguém esqueceu de silenciar a arma...
        Agora tem centenas de policiais atrás dela e ela ainda não conseguiu voltar.
    </p>

    <a href="index.html" class="btn">⬅ Voltar para a Loja</a>

</div>

</body>
</html>
